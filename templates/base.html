<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Online Bookstore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/">BookStore</a>

        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="/search">搜索</a></li>
          <li class="nav-item"><a class="nav-link" href="/cart">购物车</a></li>
          <li class="nav-item"><a class="nav-link" href="/my_orders">我的订单</a></li>
        </ul>

        <ul class="navbar-nav">
          {% if current_user %}
          <li class="nav-item"><span class="nav-link">你好，{{ current_user.username }}</span></li>
          <li class="nav-item"><a class="nav-link" href="/logout">登出</a></li>
          {% else %}
          <li class="nav-item"><a class="nav-link" href="/login">登录/注册</a></li>
          {% endif %}
          <li class="nav-item"><a class="nav-link" href="/chat">客服聊天</a></li>
        </ul>
      </div>
    </nav>

    <div class="container mt-4">{% block content %}{% endblock %}</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const popupMessage = {{ popup_message | default(None) | tojson }};
      if (popupMessage) {
        alert(popupMessage);
      }
    </script>
  </body>
</html>
