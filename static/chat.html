<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG智能客服</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f5f5f5; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { background: #007bff; color: white; padding: 20px; text-align: center; border-radius: 10px 10px 0 0; }
        .chat-box { height: 400px; overflow-y: auto; padding: 20px; border-bottom: 1px solid #ddd; }
        .message { margin-bottom: 15px; }
        .user { text-align: right; }
        .bot { text-align: left; }
        .bubble { display: inline-block; padding: 10px 15px; border-radius: 20px; max-width: 70%; }
        .user .bubble { background: #007bff; color: white; }
        .bot .bubble { background: #e9ecef; color: black; }
        .input-area { padding: 20px; display: flex; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; margin-right: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 20px; cursor: pointer; }
        button:hover { background: #0056b3; }
        nav a { color: white; text-decoration: none; margin: 0 10px; }
        nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>RAG智能客服</h1>
            <div id="status">统一账号体系：请先在网站顶部登录后使用客服</div>
            <nav>
                <a href="/">书店首页</a> |
                <a href="/chat">客服聊天</a>
            </nav>
        </div>

        <div id="chat-section">
            <div class="chat-box" id="chat-box">
                <div class="message bot">
                    <div class="bubble">您好！我是RAG智能客服，有什么可以帮助您的？</div>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="query" placeholder="请输入您的问题..." onkeypress="handleKeyPress(event)">
                <button onclick="ask()">发送</button>
            </div>
        </div>
    </div>

    <script>
        async function apiCall(url, method, body) {
            const options = { method, credentials: 'include' };
            if (body !== undefined) {
                options.headers = { 'Content-Type': 'application/json' };
                options.body = JSON.stringify(body);
            }
            const response = await fetch(url, options);
            let result = {};
            const contentType = response.headers.get('content-type') || '';
            if (contentType.includes('application/json')) {
                result = await response.json();
            }
            if (!response.ok) {
                throw new Error(result.detail || '请求失败');
            }
            return result;
        }

        async function ask() {
            const q = document.getElementById('query').value.trim();
            if (!q) return;
            addMessage('user', q);
            document.getElementById('query').value = '';
            try {
                const result = await apiCall('/ask?q=' + encodeURIComponent(q), 'GET');
                addMessage('bot', result.answer || '抱歉，我无法回答这个问题');
            } catch (error) {
                if ((error.message || '').includes('请先登录')) {
                    alert('请先登录后再使用客服聊天');
                    window.location.href = '/login?next=/chat';
                    return;
                }
                addMessage('bot', '回答失败: ' + error.message);
            }
        }

        function addMessage(sender, text) {
            const chatBox = document.getElementById('chat-box');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + sender;
            messageDiv.innerHTML = '<div class="bubble">' + text + '</div>';
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                ask();
            }
        }
    </script>
</body>
</html>
